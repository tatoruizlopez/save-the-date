<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Save the Date — Cris & Jose</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Save the Date">

      <div class="headline">
        <div class="small">Save the Date</div>
      </div>

      <div class="scratch-area">
        <!-- Texto revelado: compacto y centrado DENTRO del corazón -->
        <div class="reveal" id="reveal">
          <div class="reveal-inner">
            <div class="reveal-names">Cris <span class="amp">&amp;</span> Jose</div>
            <div class="reveal-line reveal-place">Granada</div>
            <div class="reveal-line reveal-when">
              1 de Mayo 2026 <span class="sep">·</span> <span id="hora">12:00</span>
            </div>
            <div class="reveal-hint">✨ ¡Nos casamos! ✨</div>
          </div>
        </div>

        <!-- Canvas rascable -->
        <canvas id="scratch" class="scratch-canvas" aria-label="Rasca el corazón"></canvas>

        <div class="hint" id="hint">Rasca el corazón dorado para descubrir la hora</div>
      </div>

      <footer class="footer">
        <span>Guárdate la fecha 💗</span>
      </footer>
    </section>

    <div class="below">
      <button class="btn" id="resetBtn" type="button">Reiniciar rasca</button>
      <span class="tip">Tip: en móvil, rasca con el dedo. En PC, con el ratón.</span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
